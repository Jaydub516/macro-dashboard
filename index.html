<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매크로 & 자산 배분 마스터 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script> 
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg-body: #f0f2f5; --bg-card: #ffffff; --text-main: #2c3e50; --text-sub: #7f8c8d;
            --border-dash: #bdc3c7; --input-border: #dddddd;
            --tab-active: #3498db; --tab-combined: #9b59b6; --tab-portfolio: #e67e22; 
            --tab-bg: #e0e0e0; --account-summary-bg: #eaf2f8; --profit-red: #e74c3c; --loss-blue: #2980b9;
        }
        .dark-mode {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; --text-sub: #a0a0a0;
            --border-dash: #444444; --input-border: #444444;
            --tab-active: #2980b9; --tab-combined: #8e44ad; --tab-portfolio: #d35400; 
            --tab-bg: #2c2c2c; --account-summary-bg: #1a252f; --profit-red: #ff6b6b; --loss-blue: #4dabf7;
        }

        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 0; margin: 0; display: flex; flex-direction: column; align-items: center; transition: background 0.3s, color 0.3s; }
        .dashboard-container { width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        
        .sticky-nav-wrapper { position: sticky; top: 0; z-index: 1000; background-color: var(--bg-body); padding: 20px 20px 10px 20px; margin: -20px -20px 15px -20px; border-bottom: 1px solid var(--border-dash); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; flex-wrap: wrap; gap: 10px; }
        .header-wrap h1 { margin: 0; font-size: 1.5rem; }
        .header-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .header-btn { background: var(--bg-card); border: 1px solid var(--text-sub); color: var(--text-main); padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
        .header-btn:hover { background: var(--tab-bg); }
        .btn-highlight { border-color: var(--tab-portfolio); color: var(--tab-portfolio); }

        .main-tab-container { display: flex; gap: 8px; width: 100%; }
        .main-tab-btn { flex: 1; padding: 12px; background: var(--tab-bg); border: none; color: var(--text-main); font-weight: bold; font-size: 0.95rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .main-tab-btn.active-macro { background: var(--tab-active); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-tab-btn.active-combined { background: var(--tab-combined); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-tab-btn.active-portfolio { background: var(--tab-portfolio); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .back-btn-wrap { margin-bottom: 15px; display: none; }
        .back-btn { background: transparent; border: none; color: var(--text-sub); font-weight: bold; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0; margin-bottom: 8px; }
        .back-btn:hover { color: var(--tab-portfolio); }
        .account-detail-title { margin: 5px 0; font-size: 1.4rem; color: var(--text-main); font-weight: bold; }

        .combined-selector-box { background: var(--bg-card); padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-dash); display: none; flex-wrap: wrap; gap: 10px; align-items: center; }
        .acc-checkbox-label { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; cursor: pointer; background: var(--tab-bg); padding: 4px 10px; border-radius: 15px; }

        .account-summary-box { background: var(--account-summary-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: stretch; gap: 20px; transition: background 0.3s; }
        .summary-inputs-side { display: flex; flex-direction: column; gap: 12px; width: 38%; min-width: 280px; justify-content: center; box-sizing: border-box; }
        .summary-chart-side { width: 58%; min-width: 320px; position: relative; box-sizing: border-box; background: rgba(255,255,255,0.4); border-radius: 8px; padding: 10px; }
        .dark-mode .summary-chart-side { background: rgba(0,0,0,0.2); }
        
        .summary-item { display: flex; flex-direction: column; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.04); padding-bottom: 6px; }
        .summary-item:last-child { border-bottom: none; padding-bottom: 0; }
        .summary-item .label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 4px; font-weight: bold; }
        .summary-item .value { font-size: 1.25rem; font-weight: bold; }
        .cash-sim-input { padding: 6px; border: 1px solid var(--tab-active); border-radius: 6px; width: 140px; text-align: right; background: var(--bg-card); color: var(--text-main); font-weight: bold; font-size: 1rem; }
        .profit-plus { color: var(--profit-red); }
        .profit-minus { color: var(--loss-blue); }

        #cards-container { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: max-content; gap: 20px; width: 100%; align-items: start; }
        .card { min-height: 180px; min-width: 0; position: relative; background-color: var(--bg-card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; cursor: grab; transition: transform 0.2s, box-shadow 0.2s; box-sizing: border-box; overflow: hidden; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.1); }
        
        .asset-info h2 { margin: 0; font-size: 1.1rem; color: var(--text-main); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .asset-info p { margin: 3px 0 0 0; color: var(--text-sub); font-size: 0.8rem; }
        .delete-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.4rem; color: #bdc3c7; cursor: pointer; padding: 0; line-height: 1; z-index: 10; }
        .delete-btn:hover { color: #e74c3c; }

        .chart-container { width: 100%; height: 65px; position: relative; margin: 8px 0; min-width: 0; overflow: hidden; }
        
        .price-line { font-size: 0.85rem; color: var(--text-sub); }
        .price-current { font-weight: bold; color: var(--text-main); font-size: 1.1rem; }
        .price-high { color: #e74c3c; font-size: 0.8rem; font-weight: bold; }
        .mdd-value { font-size: 1.15rem; font-weight: bold; text-align: right; }
        .status-badge { padding: 3px 8px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; white-space: nowrap; }

        .fetch-loading { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-sub); }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--border-dash); border-top-color: var(--tab-active); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-once { 0% { transform: rotate(0deg); } 100% { transform: rotate(720deg); } }
        .spin-once { animation: spin-once 1.5s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
        
        .sparkline-cell { width: 72px; padding: 4px 8px !important; vertical-align: middle !important; text-align: center !important; }

        .hub-card.roi-plus-strong  { border-color: #2ecc71 !important; }
        .hub-card.roi-plus-mild    { border-color: #a8e6c1 !important; }
        .hub-card.roi-minus-mild   { border-color: #a8c8e8 !important; }
        .hub-card.roi-minus-strong { border-color: #2980b9 !important; }

        .lower-chart-card { width: 100%; background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        .lower-charts-flex { display: flex; gap: 20px; width: 100%; flex-wrap: wrap; }
        .chart-box-third { flex: 1; min-width: 280px; position: relative; display: flex; flex-direction: column; }
        .chart-box-half { flex: 1.2; min-width: 320px; position: relative; display: flex; flex-direction: column; }
        
        .date-picker-wrap { display: flex; gap: 5px; align-items: center; }
        .date-picker-wrap input[type="month"] { padding: 4px 6px; border: 1px solid var(--input-border); border-radius: 4px; font-size: 0.75rem; background: var(--bg-card); color: var(--text-main); font-family: inherit; }

        .hub-card { background: var(--bg-card); border-radius: 12px; padding: 20px; border: 2px solid transparent; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s; height: 160px; position: relative; box-sizing: border-box; }
        .hub-card:hover { transform: translateY(-5px); border-color: var(--tab-portfolio) !important; }
        .hub-card h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .hub-val { font-size: 1.35rem; font-weight: bold; margin-bottom: 5px; }
        .hub-roi { font-size: 1.05rem; font-weight: bold; }
        .hub-add-card { border: 2px dashed var(--border-dash); background: transparent; box-shadow: none; color: var(--text-sub); }
        .hub-delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 1.2rem; color: #bdc3c7; cursor: pointer; padding: 0; line-height: 1; z-index: 10; }
        .hub-delete-btn:hover { color: #e74c3c; }

        .table-container { width: 100%; overflow-x: auto; background: var(--bg-card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; margin-bottom: 20px; }
        .portfolio-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; min-width: 900px; }
        .portfolio-table th, .portfolio-table td { padding: 12px 8px; border-bottom: 1px solid var(--border-dash); text-align: right; vertical-align: middle; }
        .portfolio-table th { background: var(--bg-body); color: var(--text-sub); font-weight: bold; text-align: right; }
        .portfolio-table th:first-child, .portfolio-table td:first-child { text-align: left; }
        .portfolio-table th:nth-child(3), .portfolio-table td:nth-child(3) { text-align: center; }
        .portfolio-table tbody tr:hover td { background: rgba(0,0,0,0.02); }
        
        .ticker-badge { background: var(--tab-bg); padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight:bold; }
        .table-input { width: 75px; padding: 6px; border: 1px solid var(--input-border); border-radius: 6px; text-align: right; background: var(--bg-body); color: var(--text-main); font-size: 0.85rem; font-weight:bold; transition: border-color 0.2s; }
        .table-input:focus { border-color: var(--tab-active); outline: none; }
        
        .class-select { padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--bg-body); color: var(--text-main); font-weight: bold; outline: none; cursor: pointer; margin-right: 8px; }

        .btn-delete-sm { background: #fee; color: #e74c3c; border: 1px solid #fcc; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: background 0.2s; }
        .btn-delete-sm:hover { background: #fcc; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; white-space: nowrap; }
        .badge-buy { background: #e3f2fd; color: #2980b9; border: 1px solid #bde0fe; }
        .badge-sell { background: #fdedec; color: #e74c3c; border: 1px solid #fadbd8; }
        .badge-hold { background: #f0f3f4; color: #7f8c8d; border: 1px solid #e5e8e8; }
        
        .editable-name { cursor: text; border-bottom: 1px dashed var(--border-dash); padding-bottom: 1px; display: inline-block; min-width: 50px; font-weight: bold;}
        .editable-name:focus { outline: none; border-bottom-color: var(--tab-active); color: var(--tab-active); }

        .add-module-box { display: flex; gap: 10px; align-items: center; background: var(--bg-card); padding: 15px; border-radius: 12px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .add-module-box select, .add-module-box input { padding: 8px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--bg-body); color: var(--text-main); font-size: 0.85rem; user-select: auto; }
        .add-module-box button { padding: 8px 18px; background-color: var(--tab-active); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; z-index: 10;}

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 700px; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { margin-top: 0; font-size: 1.3rem; border-bottom: 2px solid var(--border-dash); padding-bottom: 10px; }
        .modal-textarea { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--bg-body); color: var(--text-main); font-size: 0.85rem; box-sizing: border-box; resize: vertical; margin-bottom: 15px; font-family: monospace; }

        .drag-handle { cursor: grab; margin-right: 8px; color: #bdc3c7; font-size: 1.2rem; flex-shrink: 0; line-height: 1.2; margin-top: 1px; }
        .drag-handle:active { cursor: grabbing; color: var(--tab-active); }

        @media (max-width: 900px) { #cards-container:not(.mobile-3col) { grid-template-columns: repeat(2, 1fr); } }
        
        @media (max-width: 600px) { 
            body { padding: 0; } .dashboard-container { padding: 10px; }
            .sticky-nav-wrapper { padding: 15px 10px 10px 10px; margin: -10px -10px 15px -10px; }
            .header-wrap h1 { font-size: 1.15rem; }
            .main-tab-btn { font-size: 0.85rem; padding: 10px 5px; }
            
            .account-summary-box { flex-direction: column; align-items: stretch; padding: 12px; gap: 15px; }
            .summary-inputs-side { width: 100% !important; }
            .summary-chart-side { width: 100% !important; min-height: 200px; }
            
            .summary-item { flex-direction: row; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; margin-bottom: 2px; }
            .summary-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
            .summary-item .label { margin-bottom: 0; }
            
            #cards-container:not(.mobile-3col) { grid-template-columns: 1fr; gap: 15px; }
            #cards-container.mobile-3col { grid-template-columns: repeat(3, 1fr) !important; gap: 6px !important; }
            
            #cards-container.mobile-3col .scheduler-card { grid-column: 1 / -1; }
            
            #cards-container.mobile-3col .hub-card { padding: 6px; height: auto; min-height: 90px; justify-content: center; }
            #cards-container.mobile-3col .hub-card h2 { font-size: 0.75rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
            #cards-container.mobile-3col .hub-card p { font-size: 0.55rem; margin-bottom: 4px; }
            #cards-container.mobile-3col .hub-card .hub-val { font-size: 0.8rem; margin-bottom: 2px; }
            #cards-container.mobile-3col .hub-card .hub-roi { font-size: 0.65rem; }
            #cards-container.mobile-3col .hub-card .hub-delete-btn { font-size: 0.9rem; top: 3px; right: 3px; padding: 2px; }

            #cards-container.mobile-3col .card { padding: 8px; min-height: 105px; justify-content: flex-start; gap: 4px; }
            #cards-container.mobile-3col .card h2 { font-size: 0.75rem; }
            #cards-container.mobile-3col .card p { font-size: 0.6rem; }
            #cards-container.mobile-3col .card .chart-container { display: none !important; } 
            #cards-container.mobile-3col .card .data-section { flex-direction: column; align-items: flex-start; gap: 2px; font-size: 0.65rem; width: 100%; }
            #cards-container.mobile-3col .card .mdd-wrapper { width: 100%; }
            #cards-container.mobile-3col .card .price-current { font-size: 0.75rem; }
            #cards-container.mobile-3col .card .price-high { display: none !important; }
            #cards-container.mobile-3col .card .right-display-wrapper { width: 100%; align-items: flex-start; text-align: left; }
            #cards-container.mobile-3col .card .mdd-value { font-size: 0.8rem; text-align: left; }
            #cards-container.mobile-3col .card .status-badge { padding: 1px 4px; font-size: 0.6rem; border-radius: 4px; }
            #cards-container.mobile-3col .delete-btn { top: 4px; right: 4px; font-size: 1rem; }

            .table-container { padding: 0; border-radius: 0; box-shadow: none; border-top: 1px solid var(--border-dash); border-bottom: 1px solid var(--border-dash); overflow-x: auto; }
            .portfolio-table { min-width: 800px; }
            .portfolio-table th:first-child, .portfolio-table td:first-child {
                position: sticky; left: 0; background-color: var(--bg-card); z-index: 2;
                border-right: 1px solid var(--border-dash); padding: 8px 4px; box-shadow: 2px 0 5px rgba(0,0,0,0.05);
                width: 85px; min-width: 85px; max-width: 85px;
            }
            .portfolio-table th:first-child { z-index: 3; }
            .portfolio-table td:first-child > div { flex-direction: column; align-items: flex-start; gap: 4px; width: 100%; overflow: hidden; }
            .portfolio-table td:first-child .class-select { width: 100%; margin: 0; padding: 2px; font-size: 0.65rem; }
            .portfolio-table td:first-child .editable-name { width: 100%; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.75rem; }
            .drag-handle { display: none; }
        }
    </style>
</head>
<body>

    <div id="sync-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <h2>🔄 PC ↔ 모바일 데이터 동기화</h2>
            <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:15px; line-height: 1.5;">
                현재 기기에 저장된 종목, 수량, 계좌 등의 모든 데이터를 텍스트로 추출하여 다른 기기로 복사할 수 있습니다.
            </p>
            <textarea id="sync-data-area" class="modal-textarea" rows="6" placeholder="여기에 백업 데이터를 붙여넣고 복원 버튼을 누르세요..."></textarea>
            <div style="display:flex; gap:10px; justify-content:space-between; margin-top:10px;">
                <button class="header-btn" style="background:#34495e; color:white; border:none;" onclick="exportData()">📤 데이터 추출 (복사)</button>
                <button class="header-btn" style="background:var(--tab-portfolio); color:white; border:none;" onclick="importData()">📥 붙여넣고 복원하기</button>
            </div>
            <div style="text-align:right; margin-top:15px;">
                <button class="header-btn" onclick="document.getElementById('sync-modal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="data-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>⚙️ 엑셀 과거 자산 연동 (최신화 덮어쓰기)</h2>
            <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:15px; line-height: 1.4;">
                데이터 영역(기간, 계좌명, 투자원금, 평가금액)을 복사해서 붙여넣어 주세요.
            </p>
            <textarea id="csv-history-data" class="modal-textarea" rows="10" placeholder="26년 1월   한투AIM(재원)   62,400,000   85,434,964..."></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button class="header-btn" onclick="document.getElementById('data-modal').style.display='none'">닫기</button>
                <button class="header-btn" style="background:var(--tab-portfolio); color:white; border:none;" onclick="parseAndSaveHistoryCSV()">💾 즉시 데이터 반영</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: left;">
            <h2 id="edit-modal-title" style="margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--border-dash); padding-bottom: 10px;">데이터 수정</h2>
            <input type="hidden" id="edit-modal-ym">
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:0.85rem; color:var(--text-sub); margin-bottom:5px; font-weight:bold;">누적 투자원금 (원)</label>
                <input type="number" id="edit-modal-principal" class="table-input" style="width: 100%; box-sizing:border-box; text-align:left; font-size:1rem; padding:10px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:0.85rem; color:var(--text-sub); margin-bottom:5px; font-weight:bold;">총 평가액 (원)</label>
                <input type="number" id="edit-modal-eval" class="table-input" style="width: 100%; box-sizing:border-box; text-align:left; font-size:1rem; padding:10px;">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button class="header-btn" onclick="document.getElementById('edit-modal').style.display='none'">취소</button>
                <button class="header-btn" style="background:var(--tab-portfolio); color:white; border:none;" onclick="saveChartEdit()">💾 저장</button>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        
        <div class="sticky-nav-wrapper">
            <div class="header-wrap">
                <h1>📊 매크로 & 자산 배분 시스템</h1>
                <div class="header-controls">
                    <button class="header-btn" onclick="forceRefresh()"><span id="refresh-btn-icon" style="display:inline-block;">🔄</span> 새로고침</button>
                    <button class="header-btn" onclick="toggleLayout()" id="layout-btn">📱 1열/3열</button>
                    <button class="header-btn" onclick="document.getElementById('sync-modal').style.display='flex'">🔄 동기화</button>
                    <button class="header-btn btn-highlight" onclick="document.getElementById('data-modal').style.display='flex'">⚙️ 엑셀 연동</button>
                    <button class="header-btn theme-toggle" onclick="toggleTheme()">🌙 모드</button>
                </div>
            </div>

            <div class="main-tab-container" id="main-tabs">
                <button class="main-tab-btn active-macro" id="tab-macro" onclick="switchView('macro')">📊 거시경제</button>
                <button class="main-tab-btn" id="tab-combined" onclick="switchView('combined')">🌐 전체 합산</button>
                <button class="main-tab-btn" id="tab-portfolio_hub" onclick="switchView('portfolio_hub')">💼 포트폴리오</button>
            </div>
        </div>

        <div class="back-btn-wrap" id="back-btn-wrap">
            <button class="back-btn" onclick="switchView('portfolio_hub')">◀ 계좌 목록으로</button>
            <h2 class="account-detail-title"><span id="detail-account-name" class="editable-name" contenteditable="true" onblur="updateAccountName(this.innerText)">계좌명</span></h2>
        </div>

        <div class="combined-selector-box" id="combined-selector" style="display:none; flex-direction:column; align-items: stretch; padding: 0; border: 1px solid var(--border-dash); border-radius: 8px; margin-bottom: 15px; background: var(--bg-card); overflow: hidden;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px 15px; cursor:pointer; background: var(--account-summary-bg);" onclick="toggleCombinedSelector()">
                <span style="font-weight:bold; font-size:0.95rem; color: var(--text-main);">⚙️ 합산할 계좌 선택</span>
                <span id="combined-selector-arrow" style="color: var(--text-sub); font-size: 0.8rem;">▼</span>
            </div>
            <div id="checkbox-container" style="display:none; gap:8px; flex-wrap:wrap; padding: 12px 15px;"></div>
        </div>

        <div class="account-summary-box" id="summary-widget" style="display:none;">
            <div class="summary-inputs-side">
                <div class="summary-item"><span class="label">총 자산 평가액</span><span class="value" id="sum-total-value">0원</span></div>
                <div class="summary-item"><span class="label" id="profit-label">총 실시간 수익금</span><span class="value" id="sum-profit-value">0원 (0.0%)</span></div>
                <div class="summary-item">
                    <span class="label">💡 이번 달 누적 투자 원금</span>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="text" class="cash-sim-input" id="principal-masked-val" value="0" oninput="handleLiveCommaMasking(this, 'principal')"> <span>원</span>
                    </div>
                </div>
                <div class="summary-item">
                    <span class="label">현금 추가 시뮬레이션</span>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="text" class="cash-sim-input" style="border-color:var(--input-border);" id="simulation-masked-val" value="0" oninput="handleLiveCommaMasking(this, 'simulation')"> <span>원</span>
                    </div>
                </div>
            </div>
            
            <div class="summary-chart-side">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <span style="font-size:0.85rem; font-weight:bold;">📈 성과 트렌드</span>
                    <div class="date-picker-wrap">
                        <input type="month" id="trend-start" value="2026-01" onchange="trendStartDateStr=this.value; calculateRebalancingEngine();" style="padding:2px 4px; font-size:0.7rem; border-radius:4px; border:1px solid var(--input-border); background:var(--bg-card); color:var(--text-main);">
                        <span style="font-size:0.7rem;">~</span>
                        <input type="month" id="trend-end" value="2026-07" onchange="trendEndDateStr=this.value; calculateRebalancingEngine();" style="padding:2px 4px; font-size:0.7rem; border-radius:4px; border:1px solid var(--input-border); background:var(--bg-card); color:var(--text-main);">
                    </div>
                </div>
                <div style="height:190px; position:relative; cursor:pointer;"><canvas id="performance-trend-chart"></canvas></div>
            </div>
        </div>

        <div id="dynamic-content-area"></div>
    </div>

    <script>
        if (typeof ChartDataLabels !== 'undefined') { Chart.register(ChartDataLabels); }

        const MY_PROXY_URL = "https://script.google.com/macros/s/AKfycbzvORZeREAP6MKkYwLiqX10cApwleSCW96cezCTXAuDfAPD5zFz3O6THQ3izAUXNHxG/exec"; 

        // 💡 마이그레이션 키 V42 (최종 에러 철벽 방어 & 계좌 복구)
        const STORAGE_KEY_PREFIX = "macroDashboard_MasterV42_";
        
        let currentView = 'portfolio_hub';
        let trendStartDateStr = '2026-01';
        let trendEndDateStr = '2026-07'; 

        let rawNumericPrincipal = 0;
        let rawNumericSimulation = 0;

        const ASSET_CLASSES = [
            "📈 주식(성장)", "💰 주식(배당)", "🛡️ 주식(가치/방어)", "🚀 주식(테마/혁신)", 
            "🌐 주식(신흥국)", "📜 채권(장/단기)", "✨ 원자재/대체", "💵 현금(유동성)"
        ];
        const ASSET_CLASS_COLORS = {
            "📈 주식(성장)": "#3498db", "💰 주식(배당)": "#9b59b6", "🛡️ 주식(가치/방어)": "#2ecc71",
            "🚀 주식(테마/혁신)": "#e74c3c", "🌐 주식(신흥국)": "#1abc9c", "📜 채권(장/단기)": "#f39c12",
            "✨ 원자재/대체": "#e67e22", "💵 현금(유동성)": "#95a5a6"
        };

        const DEFAULT_MACRO_ASSETS = [
            { type: 'asset', ticker: 'MAGS', name: 'MAGS ETF (빅테크7)' },
            { type: 'asset', ticker: '^NDX', name: '나스닥 100 지수' },
            { type: 'asset', ticker: 'SGOV', name: '초단기채 (현금)' },
            { type: 'asset', ticker: '^TNX', name: '10년물 국채 금리' },
            { type: 'asset', ticker: '^VIX', name: 'VIX (공포 지수)' },
            { type: 'asset', ticker: 'KRW=X', name: '원/달러 환율' },
            { type: 'asset', ticker: 'FRED:WTREGEN', name: '미 재무부 TGA 잔고' },
            { type: 'scheduler', ticker: 'BESSENT_QRA', name: '📅 Scott Bessent 재무부 정책 일정' }
        ];

        function getAccIdByName(name) { return 'acc_' + String(name || '').replace(/\s+/g, '').replace(/[^a-zA-Z0-9가-힣]/g, ''); }

        // 💡 1. 오염 데이터(문자열 "undefined") 파싱 충돌 원천 차단 함수
        function safeParse(key, defaultVal) {
            let val = localStorage.getItem(key);
            if (!val || val === "undefined" || val === "null") return defaultVal;
            try { return JSON.parse(val) || defaultVal; } catch (e) { return defaultVal; }
        }

        // 💡 2. 딥 마이그레이션 모듈 (V22~V41 유실 계좌 강제 병합 복구)
        if (!localStorage.getItem(STORAGE_KEY_PREFIX + 'tabs')) {
            const oldPrefixes = ['macroDashboard_Master_', 'macroDashboard_MasterV22_', 'macroDashboard_MasterV23_', 'macroDashboard_MasterV24_', 'macroDashboard_MasterV25_', 'macroDashboard_MasterV26_', 'macroDashboard_MasterV27_', 'macroDashboard_MasterV27_1_', 'macroDashboard_MasterV27_Stable_', 'macroDashboard_MasterV28_', 'macroDashboard_MasterV29_', 'macroDashboard_MasterV30_', 'macroDashboard_MasterV31_', 'macroDashboard_MasterV32_', 'macroDashboard_MasterV33_', 'macroDashboard_MasterV34_', 'macroDashboard_MasterV35_', 'macroDashboard_MasterV36_', 'macroDashboard_MasterV37_', 'macroDashboard_MasterV38_', 'macroDashboard_MasterV39_', 'macroDashboard_MasterV40_', 'macroDashboard_MasterV41_'];
            let mergedTabsMap = {};

            oldPrefixes.forEach(prefix => {
                let tabsStr = localStorage.getItem(prefix + 'tabs');
                if (tabsStr && tabsStr !== "undefined" && tabsStr !== "null") {
                    try {
                        let parsed = JSON.parse(tabsStr);
                        if (Array.isArray(parsed)) {
                            parsed.forEach(t => { if (t && t.id) mergedTabsMap[t.id] = t; });
                        }
                    } catch(e) {}
                }
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    if (key && key.startsWith(prefix) && !key.endsWith('tabs')) {
                        let newKey = key.replace(prefix, STORAGE_KEY_PREFIX);
                        let val = localStorage.getItem(key);
                        if(val !== "undefined" && val !== "null") {
                            localStorage.setItem(newKey, val);
                        }
                    }
                }
            });

            let mergedTabsArr = Object.values(mergedTabsMap);
            if (mergedTabsArr.length > 0) {
                localStorage.setItem(STORAGE_KEY_PREFIX + 'tabs', JSON.stringify(mergedTabsArr));
            }
        }

        function forceRefresh() {
            const icon = document.getElementById('refresh-btn-icon');
            if(icon) { icon.classList.remove('spin-once'); void icon.offsetWidth; icon.classList.add('spin-once'); }
            livePrices = {}; window.rawChartData = {}; switchView(currentView);
        }

        function toggleCombinedSelector() {
            const container = document.getElementById('checkbox-container');
            const arrow = document.getElementById('combined-selector-arrow');
            if(container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'flex'; arrow.innerText = '▲';
            } else {
                container.style.display = 'none'; arrow.innerText = '▼';
            }
        }

        function exportData() {
            let backup = {};
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith(STORAGE_KEY_PREFIX)) backup[key] = localStorage.getItem(key);
            }
            let dataStr = btoa(encodeURIComponent(JSON.stringify(backup)));
            document.getElementById('sync-data-area').value = dataStr;
            navigator.clipboard.writeText(dataStr).then(() => { alert('데이터 복사 완료! 다른 기기로 옮기세요.'); })
            .catch(err => { document.getElementById('sync-data-area').select(); document.execCommand('copy'); alert('데이터 복사 완료!'); });
        }

        function importData() {
            let dataStr = document.getElementById('sync-data-area').value.trim();
            if(!dataStr) { alert("백업 데이터를 빈칸에 붙여넣어주세요."); return; }
            try {
                let backup = JSON.parse(decodeURIComponent(atob(dataStr)));
                let count = 0;
                for(let key in backup) { if(key.startsWith(STORAGE_KEY_PREFIX)) { localStorage.setItem(key, backup[key]); count++; } }
                if(count > 0) { alert("데이터 복원이 완벽하게 완료되었습니다!"); location.reload(); } 
                else { alert("유효한 백업 데이터 구조가 아닙니다."); }
            } catch(e) { alert("데이터 복원 중 오류가 발생했습니다."); }
        }

        function handleLiveCommaMasking(el, targetType) {
            let numericString = String(el.value).replace(/[^\d]/g, '');
            if(!numericString) numericString = '0';
            let parsedNumber = parseFloat(numericString);
            el.value = parsedNumber.toLocaleString('ko-KR');
            if(targetType === 'principal') { rawNumericPrincipal = parsedNumber; updatePrincipal(parsedNumber); } 
            else { rawNumericSimulation = parsedNumber; calculateRebalancingEngine(); }
        }

        function parseRow(line) {
            let s = String(line || '').trim();
            if (s.includes('\t')) return s.split('\t').map(v => String(v).trim().replace(/,/g, '').replace(/"/g, ''));
            let res = []; let inQ = false; let cur = '';
            for(let i=0; i<s.length; i++){
                let c = s[i]; if(c === '"') inQ = !inQ; else if(c === ',' && !inQ) { res.push(cur.trim()); cur=''; } else cur += c;
            }
            res.push(cur.trim()); return res.map(v => String(v).replace(/,/g, '').replace(/"/g, ''));
        }

        function parseAndSaveHistoryCSV() {
            const text = document.getElementById('csv-history-data').value.trim();
            if(!text) { alert("입력된 데이터가 없습니다."); return; }
            const lines = text.split('\n');
            let historyMap = {}; let tabsMap = {}; let count = 0;
            
            lines.forEach(line => {
                if(!String(line).trim()) return;
                const cols = parseRow(line);
                if(cols.length >= 4 && !String(cols[0]).includes('기간')) {
                    let period = String(cols[0]).trim(); let match = period.match(/(\d{2})년\s*(\d+)월/);
                    let ym = period; if(match) ym = `20${match[1]}-${match[2].padStart(2, '0')}`; 
                    let accName = String(cols[1]).trim(); let accId = getAccIdByName(accName);
                    tabsMap[accId] = accName;
                    let principal = parseFloat(String(cols[2]).replace(/[^\d.-]/g, '')) || 0; 
                    let evalVal = parseFloat(String(cols[3]).replace(/[^\d.-]/g, '')) || 0;
                    if(!historyMap[accId]) historyMap[accId] = [];
                    historyMap[accId].push({ date: ym + '-28', principal: principal, evalValue: evalVal }); count++;
                }
            });

            if(count === 0) { alert("데이터를 인식하지 못했습니다."); return; }

            let currentTabs = safeParse(STORAGE_KEY_PREFIX + 'tabs', []);
            Object.keys(historyMap).forEach(accId => {
                let existingHistory = safeParse(STORAGE_KEY_PREFIX + 'history_' + accId, []);
                let newHistoryDict = {};
                existingHistory.forEach(h => newHistoryDict[h.date.substring(0,7)] = h);
                historyMap[accId].forEach(nh => newHistoryDict[nh.date.substring(0,7)] = nh); 
                let sortedHistory = Object.values(newHistoryDict).sort((a,b) => String(a.date).localeCompare(String(b.date)));
                localStorage.setItem(STORAGE_KEY_PREFIX + 'history_' + accId, JSON.stringify(sortedHistory));
                let tab = currentTabs.find(t => t.id === accId);
                let latestP = sortedHistory[sortedHistory.length-1].principal;
                if(!tab) { currentTabs.push({ id: accId, name: "💼 " + tabsMap[accId], principal: latestP }); } else { tab.principal = latestP; }
            });

            localStorage.setItem(STORAGE_KEY_PREFIX + 'tabs', JSON.stringify(currentTabs));
            if(!localStorage.getItem(STORAGE_KEY_PREFIX + 'combinedSelections')) { localStorage.setItem(STORAGE_KEY_PREFIX + 'combinedSelections', JSON.stringify(currentTabs.map(t=>t.id))); }

            alert(count + '건의 과거 성과 데이터가 성공적으로 반영되었습니다!');
            document.getElementById('data-modal').style.display = 'none'; document.getElementById('csv-history-data').value = '';
            portfolioTabs = safeParse(STORAGE_KEY_PREFIX + 'tabs', []);
            combinedSelections = safeParse(STORAGE_KEY_PREFIX + 'combinedSelections', []);
            portfolios = {}; portfolioTabs.forEach(tab => { portfolios[tab.id] = safeParse(STORAGE_KEY_PREFIX + tab.id, []); });
            switchView(currentView);
        }

        if (!localStorage.getItem(STORAGE_KEY_PREFIX + 'init_v42')) {
            let macroCheck = safeParse(STORAGE_KEY_PREFIX + 'macro', DEFAULT_MACRO_ASSETS);
            let hasTGA = macroCheck.some(a => a.ticker === 'FRED:WTREGEN');
            if(!hasTGA) macroCheck.push({ type: 'asset', ticker: 'FRED:WTREGEN', name: '미 재무부 TGA 잔고' });
            let hasSched = macroCheck.some(a => a.ticker === 'BESSENT_QRA');
            if(!hasSched) macroCheck.push({ type: 'scheduler', ticker: 'BESSENT_QRA', name: '📅 Scott Bessent 재무부 정책 일정' });
            localStorage.setItem(STORAGE_KEY_PREFIX + 'macro', JSON.stringify(macroCheck));
            
            let tabs = safeParse(STORAGE_KEY_PREFIX + 'tabs', []);
            if(tabs.length === 0) { alert("초기화된 환경입니다. 엑셀을 붙여넣어 계좌를 활성화해주세요!"); }
            localStorage.setItem(STORAGE_KEY_PREFIX + 'init_v42', 'true');
        }

        let portfolioTabs = safeParse(STORAGE_KEY_PREFIX + 'tabs', []);
        let combinedSelections = safeParse(STORAGE_KEY_PREFIX + 'combinedSelections', []);
        let portfolios = {}; 
        portfolioTabs.forEach(tab => { portfolios[tab.id] = safeParse(STORAGE_KEY_PREFIX + tab.id, []); });
        let macroAssets = safeParse(STORAGE_KEY_PREFIX + 'macro', DEFAULT_MACRO_ASSETS);

        let livePrices = {}; let chartInstances = {}; let summaryChartInstance = null; let trendChartInstance = null; let assetClassChartInstance = null;
        
        const _fetchingPromises = {};

        if(localStorage.getItem("theme_Master") === "dark") document.body.classList.add("dark-mode");
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("theme_Master", document.body.classList.contains("dark-mode") ? "dark" : "light");
            if(currentView !== 'macro' && currentView !== 'portfolio_hub') calculateRebalancingEngine();
        }

        function toggleLayout() {
            let container = document.getElementById('cards-container');
            if (container) {
                if (container.classList.contains('mobile-3col')) { container.classList.remove('mobile-3col'); localStorage.setItem('mobileLayout_Master', '1col'); }
                else { container.classList.add('mobile-3col'); localStorage.setItem('mobileLayout_Master', '3col'); }
                if(currentView === 'macro') renderDashboard(); 
            }
        }

        function saveTabs() { localStorage.setItem(STORAGE_KEY_PREFIX + 'tabs', JSON.stringify(portfolioTabs)); }
        function saveCombinedSelections() { localStorage.setItem(STORAGE_KEY_PREFIX + 'combinedSelections', JSON.stringify(combinedSelections)); }
        function saveCurrentState() {
            if (currentView === 'macro') localStorage.setItem(STORAGE_KEY_PREFIX + 'macro', JSON.stringify(macroAssets));
            else if (currentView !== 'combined' && currentView !== 'portfolio_hub') localStorage.setItem(STORAGE_KEY_PREFIX + currentView, JSON.stringify(portfolios[currentView] || []));
        }

        function getAggregatedAssets() {
            let aggregatedMap = {};
            (combinedSelections || []).forEach(accId => {
                let accAssets = portfolios[accId] || [];
                accAssets.forEach(a => {
                    const safeTicker = String(a.ticker || 'unknown');
                    if (!aggregatedMap[safeTicker]) { aggregatedMap[safeTicker] = { type: 'portfolio', ticker: safeTicker, name: String(a.name || safeTicker), quantity: 0, targetWeight: 0, assetClass: String(a.assetClass || "📈 주식(성장)") }; }
                    aggregatedMap[safeTicker].quantity += parseFloat(a.quantity) || 0;
                });
            });
            return Object.values(aggregatedMap);
        }

        function getActiveArray() {
            if (currentView === 'macro') return macroAssets; if (currentView === 'combined') return getAggregatedAssets();
            if (currentView === 'portfolio_hub') return []; return portfolios[currentView] || [];
        }

        function switchView(viewMode) {
            currentView = viewMode;
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.className = 'main-tab-btn');
            if(viewMode === 'macro') document.getElementById('tab-macro').className = 'main-tab-btn active-macro';
            else if(viewMode === 'combined') document.getElementById('tab-combined').className = 'main-tab-btn active-combined';
            else document.getElementById('tab-portfolio_hub').className = 'main-tab-btn active-portfolio';

            const summaryWidget = document.getElementById('summary-widget');
            const combinedBox = document.getElementById('combined-selector');
            const backBtn = document.getElementById('back-btn-wrap');
            const principalInput = document.getElementById('principal-masked-val');

            summaryWidget.style.display = 'none'; combinedBox.style.display = 'none'; backBtn.style.display = 'none';

            portfolioTabs = safeParse(STORAGE_KEY_PREFIX + 'tabs', []);
            combinedSelections = safeParse(STORAGE_KEY_PREFIX + 'combinedSelections', []);

            if (viewMode === 'macro') {
                renderDashboard();
            } else if (viewMode === 'portfolio_hub') {
                renderHubView();
            } else {
                summaryWidget.style.display = 'flex';
                if(viewMode === 'combined') { 
                    combinedBox.style.display = 'flex'; principalInput.disabled = true; 
                    
                    document.getElementById('checkbox-container').style.display = 'none';
                    document.getElementById('combined-selector-arrow').innerText = '▼';
                    let cbHtml = '';
                    portfolioTabs.forEach(tab => {
                        let isChecked = combinedSelections.includes(tab.id) ? 'checked' : '';
                        cbHtml += `<label class="acc-checkbox-label"><input type="checkbox" value="${tab.id}" ${isChecked} onchange="updateCombinedSelection()"> ${String(tab.name)}</label>`;
                    });
                    document.getElementById('checkbox-container').innerHTML = cbHtml; 
                } else {
                    backBtn.style.display = 'block'; principalInput.disabled = false;
                    let tab = portfolioTabs.find(t => t.id === currentView);
                    if(tab) { document.getElementById('detail-account-name').innerText = String(tab.name); rawNumericPrincipal = Math.round(parseFloat(tab.principal) || 0); principalInput.value = rawNumericPrincipal.toLocaleString('ko-KR'); }
                }
                renderDashboard();
            }
        }

        function updateAccountName(newName) {
            if (currentView === 'macro' || currentView === 'combined' || currentView === 'portfolio_hub') return;
            let tab = portfolioTabs.find(t => t.id === currentView);
            if (tab && String(newName).trim() !== "") { tab.name = String(newName).trim(); saveTabs(); }
        }

        function updatePrincipal(parsedNumber) {
            if (currentView === 'combined') return;
            let tab = portfolioTabs.find(t => t.id === currentView);
            if(tab) { tab.principal = parsedNumber; saveTabs(); calculateRebalancingEngine(); }
        }

        function saveChartEdit() {
            const ym = document.getElementById('edit-modal-ym').value;
            const p = parseFloat(document.getElementById('edit-modal-principal').value) || 0;
            const e = parseFloat(document.getElementById('edit-modal-eval').value) || 0;
            document.getElementById('edit-modal').style.display = 'none';
            let hKey = STORAGE_KEY_PREFIX + 'history_' + currentView;
            let history = safeParse(hKey, []);
            let match = history.find(h => String(h.date).substring(0,7) === ym);
            if (match) { match.principal = p; match.evalValue = e; } 
            else { history.push({ date: ym + '-28', principal: p, evalValue: e }); }
            history.sort((a,b) => String(a.date).localeCompare(String(b.date)));
            localStorage.setItem(hKey, JSON.stringify(history));
            calculateRebalancingEngine();
        }

        function updateCombinedSelection() {
            let checkboxes = document.querySelectorAll('#checkbox-container input[type="checkbox"]');

        function addNewAccount() {
            let name = prompt("새로운 계좌 이름을 입력하세요"); if (!name) return;
            let newId = 'acc_' + Date.now(); portfolioTabs.push({ id: newId, name: "💼 " + String(name).trim(), principal: 0 });
            portfolios[newId] = []; combinedSelections.push(newId); saveCombinedSelections(); saveTabs(); switchView(newId);

        function bulkTakeSnapshot() {
            let dateStr = new Date().toISOString().split('T')[0]; let ym = dateStr.substring(0,7);
            if(!confirm(`현재 실시간 주가와 원금을 기준으로 모든 계좌의 [${ym}] 마감 기록을 저장하시겠습니까?\n(이미 이번 달 기록이 있다면 새 값으로 덮어씁니다.)`)) return;

            let fxRate = parseFloat(livePrices['KRW=X']) || 1350;
            portfolioTabs.forEach(tab => {
                let accAssets = portfolios[tab.id] || []; let totalVal = 0;
                accAssets.forEach(a => {
                    let t = String(a.ticker || '').toUpperCase(); let p = parseFloat(livePrices[a.ticker]) || 1;
                    if(['CASH','예수금','현금'].includes(t)) p = 1;
                    const isWon = t.indexOf('.KS') !== -1 || t.indexOf('.KQ') !== -1 || t === 'CASH';
                    totalVal += isWon ? (p * (parseFloat(a.quantity)||0)) : (p * (parseFloat(a.quantity)||0) * fxRate);
                });
                let hKey = STORAGE_KEY_PREFIX + 'history_' + tab.id;
                let history = safeParse(hKey, []);
                history = history.filter(h => String(h.date).substring(0,7) !== ym);
                history.push({ date: ym + '-28', principal: parseFloat(tab.principal) || 0, evalValue: totalVal });
                history.sort((a,b) => String(a.date).localeCompare(String(b.date)));
                localStorage.setItem(hKey, JSON.stringify(history));
            });
            alert('✅ 모든 계좌의 이번 달 실적 마감이 완료되어 차트에 영구 반영되었습니다.'); renderHubView();
        }

        function drawSparkline(cellId, prices) {
            const cell = document.getElementById(cellId);
            if (!cell || !Array.isArray(prices) || prices.length < 2) return;
            const W = 64, H = 28, pad = 2;
            const min = Math.min(...prices), max = Math.max(...prices);
            const range = max - min || 1;
            const pts = prices.map((p, i) => {
                const x = pad + (i / (prices.length - 1)) * (W - pad * 2);
                const y = H - pad - ((p - min) / range) * (H - pad * 2);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const last = prices[prices.length - 1]; const first = prices[0];
            const color = last >= first ? '#2ecc71' : '#e74c3c';
            const lx = (pad + (W - pad * 2)).toFixed(1);
            const ly = (H - pad - ((last - min) / range) * (H - pad * 2)).toFixed(1);
            cell.innerHTML = `<svg width="${W}" height="${H}" style="display:block;margin:auto;overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
        }

        function fetchOnce(ticker) {
            const safeTicker = String(ticker);
            if (_fetchingPromises[safeTicker]) return _fetchingPromises[safeTicker];
            const p = fetch(`${MY_PROXY_URL}?ticker=${encodeURIComponent(safeTicker)}`).then(r => {
                if(!r.ok) throw new Error("HTTP error " + r.status);
                return r.json();
            }).finally(() => { delete _fetchingPromises[safeTicker]; });
            _fetchingPromises[safeTicker] = p; return p;
        }

        async function fetchData(asset, cardId) {
            const tickerStr = String(asset.ticker || '').toUpperCase();
            if(['CASH','예수금','현금'].includes(tickerStr)) { livePrices[asset.ticker] = 1; livePrices[asset.ticker+'_h'] = 1; updateCardUI(asset, cardId, 1, 1); return; }
            
            const viewAtCall = currentView;
            try {
                const data = await fetchOnce(asset.ticker);
                if (!data.success) throw new Error("API Return Fail");
                livePrices[asset.ticker] = data.price; livePrices[asset.ticker+'_h'] = data.high52;

                if(!window.rawChartData) window.rawChartData = {};
                if(data.chartData && data.chartLabels) { window.rawChartData[asset.ticker] = { prices: data.chartData, labels: data.chartLabels }; }

                if(viewAtCall === 'macro') { if(data.chartData && data.chartLabels) { drawChart(cardId, data.chartLabels, data.chartData, false); } }
                if(viewAtCall !== 'macro' && viewAtCall !== 'portfolio_hub') {
                    if(data.chartData) drawSparkline('spark-' + cardId, data.chartData);
                }
                if(viewAtCall === currentView) { updateCardUI(asset, cardId, data.price, data.high52); }
            } catch (error) { 
                if(viewAtCall === currentView) {
                    const pEl = document.getElementById(`price-${cardId}`); if (pEl) pEl.innerText = "조회 실패"; 
                    const sEl = document.getElementById(`status-${cardId}`); if (sEl) { sEl.innerText = "통신 에러"; sEl.className = "status-badge status-warning"; sEl.style.display = 'inline-block'; }
                }
            }
        }

        function updateCardUI(asset, cardId, currentPrice, high52) {
            const tickerStr = String(asset.ticker || '').toUpperCase();
            const isWon = tickerStr.indexOf('.KS') !== -1 || tickerStr.indexOf('.KQ') !== -1 || tickerStr === 'CASH';
            let cp = parseFloat(currentPrice) || 0; let hp = parseFloat(high52) || 0;
            let displayPrice = isWon ? Math.round(cp).toLocaleString() + "원" : "$" + cp.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            let displayHigh = isWon ? Math.round(hp).toLocaleString() + "원" : "$" + hp.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            const pEl = document.getElementById(`price-${cardId}`); if (pEl) pEl.innerText = displayPrice;

            const sparkEl = document.getElementById(`spark-${cardId}`);
            if(sparkEl && window.rawChartData && window.rawChartData[asset.ticker]) {
                const prices = window.rawChartData[asset.ticker].prices;
                if(prices && prices.length > 1) {
                    let min = Math.min(...prices), max = Math.max(...prices);
                    let range = max - min || 1;
                    let w = 60, h = 25; 
                    let pts = prices.map((p, i) => `${(i/(prices.length-1))*w},${h - ((p-min)/range)*h}`).join(' ');
                    let color = prices[prices.length-1] >= prices[0] ? '#2ecc71' : '#e74c3c'; 
                    sparkEl.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 -5 ${w} ${h+10}" preserveAspectRatio="none"><polyline fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
                } else { sparkEl.innerHTML = '-'; }
            }
            
            if (currentView === 'macro') {
                const hEl = document.getElementById(`high-${cardId}`); if(hEl) hEl.innerText = displayHigh;
                let mdd = hp > 0 ? (cp / hp) - 1 : 0; let mddPercentage = (mdd * 100).toFixed(2) + "%";
                let statusMsg = "✅ 관망"; let statusClass = "status-normal";
                if (tickerStr.indexOf('FRED:') === 0) { displayPrice = "$" + cp.toLocaleString('en-US', { minimumFractionDigits: 1 }) + "B"; mddPercentage = "유동성"; statusMsg = "💵 TGA"; if(pEl) pEl.innerText = displayPrice; }
                else if (tickerStr === 'KRW=X') { mddPercentage = "환율"; statusMsg = "💵 외환"; } 
                else if (tickerStr === '^TNX') { displayPrice = cp.toFixed(2) + "%"; mddPercentage = "금리"; if (cp >= 4.5) { statusMsg = "⚠️ 발작 대기"; statusClass = "status-warning"; } if(pEl) pEl.innerText = displayPrice; } 
                else if (tickerStr === '^VIX') { displayPrice = cp.toFixed(2) + "pt"; mddPercentage = "공포지수"; if (cp >= 25) { statusMsg = "⚠️ 변동성 확대"; statusClass = "status-warning"; } if(pEl) pEl.innerText = displayPrice; } 
                else { if (mdd <= -0.15) { statusMsg = "🎯 1차 매수"; statusClass = "status-warning"; } }
                
                const mEl = document.getElementById(`mdd-${cardId}`); if (mEl) mEl.innerText = mddPercentage;
                const sEl = document.getElementById(`status-${cardId}`); if (sEl) { sEl.style.display = 'inline-block'; sEl.innerText = statusMsg; sEl.className = "status-badge " + statusClass; }
            }
        }

        function drawChart(cardId, labels, data, isDanger) {
            const canvas = document.getElementById(`canvas-${cardId}`); if (!canvas) return;
            const lineColor = isDanger ? '#e74c3c' : '#3498db'; 
            let pointRadii = new Array(data.length).fill(0); let pointColors = new Array(data.length).fill('transparent'); 
            let maxVal = -Infinity; let maxIdx = -1; for (let i = 0; i < data.length; i++) { if (data[i] > maxVal) { maxVal = data[i]; maxIdx = i; } }
            if (maxIdx !== -1) { pointRadii[maxIdx] = 3; pointColors[maxIdx] = '#e74c3c'; }
            if (chartInstances[cardId]) { if(typeof chartInstances[cardId].destroy === 'function') chartInstances[cardId].destroy(); }
            chartInstances[cardId] = new Chart(canvas.getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: [{ data: data, borderColor: lineColor, backgroundColor: 'transparent', borderWidth: 1.2, pointRadius: pointRadii, pointBackgroundColor: pointColors, pointBorderColor: pointColors }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { display: false }, y: { display: false } }, layout: { padding: { top: 4, bottom: 2 } } }
            });
        }

        function updateInlineAsset(ticker, field, value) {
            let list = getActiveArray(); let asset = list.find(a => a.ticker === ticker);
            if (asset) { asset[field] = (field==='name'||field==='assetClass')? String(value): parseFloat(value)||0; saveCurrentState(); if (currentView !== 'macro') calculateRebalancingEngine(); }
        }

        function gridAddModule(viewType) {
            const type = document.getElementById('add-type') ? document.getElementById('add-type').value : 'asset';
            let ticker = String(document.getElementById('add-ticker').value || '').trim().toUpperCase();
            let customName = String(document.getElementById('add-name').value || '').trim();
            let qtyInput = document.getElementById('add-qty'); let initialQty = qtyInput ? (parseFloat(qtyInput.value) || 0) : 0;
            if(type === 'cash') { ticker = 'CASH'; if(!customName) customName = '원화 예수금'; } if (!ticker) return;
            
            let list = getActiveArray();
            let defaultClass = "📈 주식(성장)";
            if(ticker === 'CASH') defaultClass = "💵 현금(유동성)";

            list.push({ type: viewType === 'macro' ? 'asset' : 'portfolio', ticker: ticker, name: customName, quantity: initialQty, targetWeight: 0, assetClass: defaultClass });
            saveCurrentState(); renderDashboard();
        }

        function removeAsset(ticker) {
            if(currentView === 'macro') macroAssets = macroAssets.filter(a => a.ticker !== ticker);
            else portfolios[currentView] = portfolios[currentView].filter(a => a.ticker !== ticker);
            saveCurrentState(); renderDashboard();
        }

        // 💡 1. 계산 엔진 0원 버그 전면 방어 (데이터 증발/오류 차단)
        function calculateRebalancingEngine() {
            if(currentView === 'macro' || currentView === 'portfolio_hub') return;
            try {
                let list = getActiveArray(); let isCombined = (currentView === 'combined');
                let totalAccountValueInWon = 0; let totalPrincipal = 0;
                let chartLabels = []; let actualDataArr = []; let targetDataArr = []; let assetClassSums = {};
                
                const currentFxRate = parseFloat(livePrices['KRW=X']) || 1350; 

                list.forEach(asset => {
                    let tickerStr = String(asset.ticker || '').toUpperCase(); 
                    let price = parseFloat(livePrices[asset.ticker]) || 1; 
                    if(['CASH','예수금','현금'].includes(tickerStr)) price = 1;
                    
                    const isWon = tickerStr.indexOf('.KS') !== -1 || tickerStr.indexOf('.KQ') !== -1 || tickerStr === 'CASH';
                    let qty = parseFloat(String(asset.quantity).replace(/,/g, '')) || 0;
                    
                    asset.evalValueWon = isWon ? (price * qty) : (price * qty * currentFxRate);
                    if(isNaN(asset.evalValueWon)) asset.evalValueWon = 0;
                    
                    totalAccountValueInWon += asset.evalValueWon;
                });

                if (isCombined) {
                    (combinedSelections || []).forEach(accId => {
                        let tabInfo = portfolioTabs.find(t => t.id === accId);
                        totalPrincipal += tabInfo ? (parseFloat(tabInfo.principal) || 0) : 0; 
                    });
                    const pValEl = document.getElementById('principal-masked-val'); 
                    if(pValEl && document.activeElement !== pValEl) pValEl.value = Math.round(totalPrincipal).toLocaleString('ko-KR');
                } else {
                    let tabInfo = portfolioTabs.find(t => t.id === currentView); 
                    totalPrincipal = tabInfo ? (parseFloat(tabInfo.principal) || 0) : 0;
                }

                let finalTotalAccountValueWon = totalAccountValueInWon + rawNumericSimulation;
                let profit = totalAccountValueInWon - totalPrincipal; 
                let roi = totalPrincipal > 0 ? (profit / totalPrincipal) * 100 : 0;

                const sTotalEl = document.getElementById('sum-total-value'); const sProfitEl = document.getElementById('sum-profit-value');
                if(sTotalEl) sTotalEl.innerText = Math.round(finalTotalAccountValueWon).toLocaleString() + "원";
                if(sProfitEl) sProfitEl.innerHTML = `<span class="${profit>=0?'profit-plus':'profit-minus'}">${profit>=0?'+':''}${Math.round(profit).toLocaleString()}원 (${roi.toFixed(1)}%)</span>`;

                list.forEach(asset => {
                    const safeTicker = String(asset.ticker || 'unknown').replace(/[^a-zA-Z0-9]/g, '');
                    const rowId = 'row-' + safeTicker;
                    const evalEl = document.getElementById(`eval-${rowId}`); const actWtEl = document.getElementById(`actual-weight-${rowId}`); const sigEl = document.getElementById(`signal-${rowId}`);
                    
                    let actualWeight = finalTotalAccountValueWon > 0 ? (asset.evalValueWon / finalTotalAccountValueWon) * 100 : 0;
                    chartLabels.push(String(asset.name || asset.ticker)); actualDataArr.push(parseFloat(actualWeight.toFixed(1))); targetDataArr.push(parseFloat(asset.targetWeight || 0));

                    let aClass = String(asset.assetClass || "📈 주식(성장)");
                    if(!assetClassSums[aClass]) assetClassSums[aClass] = 0; assetClassSums[aClass] += actualWeight;

                    if(evalEl) evalEl.innerText = Math.round(asset.evalValueWon).toLocaleString() + '원';
                    if(actWtEl) actWtEl.innerText = actualWeight.toFixed(1) + "%";
                    
                    let tradeRequiredWon = (finalTotalAccountValueWon * ((parseFloat(asset.targetWeight)||0) / 100)) - asset.evalValueWon;
                    
                    if(sigEl) {
                        const curPrice = parseFloat(livePrices[asset.ticker]) || 0;
                        let tickerUpper = String(asset.ticker || '').toUpperCase();
                        const isWonAsset = tickerUpper.indexOf('.KS') !== -1 || tickerUpper.indexOf('.KQ') !== -1 || tickerUpper === 'CASH';
                        const targetUnitPriceWon = isWonAsset ? curPrice : curPrice * currentFxRate;

                        if (Math.abs(tradeRequiredWon) < 15000) { 
                            sigEl.innerHTML = `<span class="badge badge-hold">HOLD</span>`; 
                        }
                        else if (tradeRequiredWon > 0) { 
                            const sharesTxt = targetUnitPriceWon > 0 ? `<br><span style="font-size:0.75rem; color:var(--text-sub); font-weight:bold;">(≈ ${(tradeRequiredWon / targetUnitPriceWon).toFixed(1)}주)</span>` : '';
                            sigEl.innerHTML = `<span class="badge badge-buy">+${Math.round(tradeRequiredWon).toLocaleString()}원 매수</span>${sharesTxt}`; 
                        }
                        else { 
                            const sharesTxt = targetUnitPriceWon > 0 ? `<br><span style="font-size:0.75rem; color:var(--text-sub); font-weight:bold;">(≈ ${(Math.abs(tradeRequiredWon) / targetUnitPriceWon).toFixed(1)}주)</span>` : '';
                            sigEl.innerHTML = `<span class="badge badge-sell">${Math.round(Math.abs(tradeRequiredWon)).toLocaleString()}원 매도</span>${sharesTxt}`; 
                        }
                    }
                });

                let rawHistory = [];
                try {
                    if (isCombined) {
                        let combinedMap = {};
                        (combinedSelections || []).forEach(accId => {
                            let h = safeParse(STORAGE_KEY_PREFIX + 'history_' + accId, []);
                            if(Array.isArray(h)) {
                                h.forEach(snap => {
                                    if(!combinedMap[snap.date]) combinedMap[snap.date] = { principal: 0, evalValue: 0, date: snap.date };
                                    combinedMap[snap.date].principal += (parseFloat(snap.principal)||0); 
                                    combinedMap[snap.date].evalValue += (parseFloat(snap.evalValue)||0);
                                });
                            }
                        });
                        rawHistory = Object.values(combinedMap).sort((a,b) => String(a.date).localeCompare(String(b.date)));
                    } else {
                        rawHistory = safeParse(STORAGE_KEY_PREFIX + 'history_' + currentView, []);
                        if(!Array.isArray(rawHistory)) rawHistory = [];
                    }
                } catch(e) { rawHistory = []; }

                const currentYM = `${new Date().getFullYear()}-${("0" + (new Date().getMonth() + 1)).slice(-2)}-28`;
                let currentMonthIdx = rawHistory.findIndex(r => r.date === currentYM);
                let currentMonthData = { principal: totalPrincipal, evalValue: totalAccountValueInWon, date: currentYM, isCurrent: true };
                if(currentMonthIdx > -1) rawHistory[currentMonthIdx] = currentMonthData; else rawHistory.push(currentMonthData);

                const safeFilteredHistory = rawHistory.filter(h => String(h.date).substring(0,7) >= trendStartDateStr && String(h.date).substring(0,7) <= trendEndDateStr);
                let trendLabels = safeFilteredHistory.map(h => h.isCurrent ? '현재' : String(h.date).substring(2,7).replace('-','/')); 
                let trendAmtData = safeFilteredHistory.map(h => h.evalValue - h.principal);
                let trendRateData = safeFilteredHistory.map(h => { let p = h.evalValue - h.principal; return h.principal > 0 ? ((p / h.principal) * 100).toFixed(1) : 0; });
                let barColors = trendAmtData.map(val => val >= 0 ? 'rgba(231, 76, 60, 0.4)' : 'rgba(41, 128, 185, 0.4)');
                let barBorders = trendAmtData.map(val => val >= 0 ? '#e74c3c' : '#2980b9');

                if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }
                if (summaryChartInstance) { summaryChartInstance.destroy(); summaryChartInstance = null; }
                if (assetClassChartInstance) { assetClassChartInstance.destroy(); assetClassChartInstance = null; }

                const isDark = document.body.classList.contains("dark-mode");
                const textColor = isDark ? '#a0a0a0' : '#7f8c8d'; const gridColor = isDark ? '#333' : '#eee';

                const donutCanvas = document.getElementById('asset-class-donut-chart');
                if (donutCanvas) {
                    let originalLabels = Object.keys(assetClassSums); 
                    let donutData = Object.values(assetClassSums).map(v => parseFloat(v.toFixed(1)));
                    
                    // 💡 3. 도넛 차트 0% 오류 (Divide by Zero) 강제 셧다운 방어 완료
                    const totalWeightSum = donutData.reduce((a,b) => a+b, 0);
                    let displayLabels, donutColors;

                    if (totalWeightSum === 0) {
                        displayLabels = ['데이터 없음']; donutData = [100]; donutColors = ['#e0e0e0'];
                    } else {
                        // 💡 기능 요청: 범례(Legend) 텍스트를 "자산군 00.0%" 형태로 강제 변환
                        displayLabels = originalLabels.map((l, i) => `${l}  ${donutData[i]}%`);
                        donutColors = originalLabels.map(l => ASSET_CLASS_COLORS[l] || '#95a5a6');
                    }

                    assetClassChartInstance = new Chart(donutCanvas.getContext('2d'), {
                        type: 'doughnut', data: { labels: displayLabels, datasets: [{ data: donutData, backgroundColor: donutColors, borderWidth: 1, borderColor: isDark ? '#1e1e1e' : '#fff' }] },
                        options: {
                            responsive: true, maintainAspectRatio: false, cutout: '60%',
                            plugins: {
                                legend: { display: totalWeightSum > 0, position: 'right', labels: { boxWidth: 10, font: {size: 11, weight:'bold'}, color: textColor, padding: 12 } },
                                datalabels: { 
                                    color: isDark ? '#fff' : '#2c3e50', font: { weight: 'bold', size: 12 }, 
                                    formatter: (value) => (totalWeightSum > 0 && value > 4) ? value + '%' : '' 
                                },
                                tooltip: { callbacks: { label: (ctx) => totalWeightSum > 0 ? ' ' + ctx.raw + '%' : ' 데이터 없음' } }
                            }
                        }
                    });
                }

                const barCanvas = document.getElementById('portfolio-summary-chart');
                if (barCanvas && chartLabels.length > 0) {
                    const palette = ['#3498db', '#e74c3c', '#2ecc71', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#34495e', '#16a085', '#27ae60', '#2980b9', '#8e44ad', '#f39c12', '#d35400', '#c0392b'];
                    let summaryDatasets = chartLabels.map((label, idx) => ({ 
                        label: label, data: [targetDataArr[idx] || 0, actualDataArr[idx] || 0], backgroundColor: palette[idx % palette.length], borderWidth: 1, borderColor: isDark ? '#1e1e1e' : '#fff' 
                    }));
                    summaryChartInstance = new Chart(barCanvas.getContext('2d'), {
                        type: 'bar', data: { labels: ['🎯 목표', '📊 실제'], datasets: summaryDatasets }, 
                        options: { 
                            indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                            plugins: { 
                                legend: { display: false }, 
                                tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + ctx.raw + '%' } },
                                datalabels: { color: '#ffffff', font: { weight: 'bold', size: 10 }, formatter: (value) => value > 5 ? value + '%' : '' }
                            }, 
                            scales: { x: { stacked: true, max: 100, ticks: { color: textColor, font:{size:10} }, grid: { color: gridColor } }, y: { stacked: true, ticks: { color: textColor, font:{size:11, weight:'bold'} }, grid: { display: false } } } 
                        }
                    });
                }

                const trendCanvas = document.getElementById('performance-trend-chart');
                if (trendCanvas && safeFilteredHistory.length > 0) {
                    trendChartInstance = new Chart(trendCanvas.getContext('2d'), {
                        data: {
                            labels: trendLabels,
                            datasets: [
                                { type: 'bar', label: '수익금 (원)', data: trendAmtData, backgroundColor: barColors, borderColor: barBorders, borderWidth: 1, yAxisID: 'y' },
                                { type: 'line', label: '수익률 (%)', data: trendRateData, borderColor: '#f39c12', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#f39c12', yAxisID: 'y1', tension: 0.1 }
                            ]
                        },
                        plugins: [{
                            id: 'trendLabelPlugin',
                            afterDatasetsDraw(chart) {
                                const ctx = chart.ctx; ctx.font = 'bold 10px "Malgun Gothic"'; ctx.textAlign = 'center';
                                const barMeta = chart.getDatasetMeta(0); const lineMeta = chart.getDatasetMeta(1);
                                if (barMeta.hidden && lineMeta.hidden) return;

                                for (let idx = 0; idx < chart.data.labels.length; idx++) {
                                    const barEl = barMeta.data[idx]; const lineEl = lineMeta.data[idx];
                                    const barVal = parseFloat(chart.data.datasets[0].data[idx])||0; const lineVal = parseFloat(chart.data.datasets[1].data[idx])||0;
                                    let barLabelY = barEl ? (barVal >= 0 ? barEl.y - 4 : barEl.y + 4) : 0;
                                    let lineLabelY = lineEl ? (lineVal >= 0 ? lineEl.y - 12 : lineEl.y + 12) : 0;

                                    if (barEl && lineEl && !barMeta.hidden && !lineMeta.hidden && barVal !== 0) {
                                        if (Math.abs(barLabelY - lineLabelY) < 18) {
                                            if (lineLabelY <= barLabelY) { lineLabelY -= 8; barLabelY += 8; } else { lineLabelY += 8; barLabelY -= 8; }
                                        }
                                    }
                                    ctx.strokeStyle = isDark ? 'rgba(30,30,30,0.9)' : 'rgba(255,255,255,0.9)'; ctx.lineWidth = 4;
                                    
                                    if (barEl && !barMeta.hidden && barVal !== 0) {
                                        ctx.fillStyle = isDark ? '#e0e0e0' : '#2c3e50';
                                        ctx.textBaseline = barVal >= 0 ? 'bottom' : 'top';
                                        ctx.strokeText(Math.round(barVal / 10000).toLocaleString() + '만', barEl.x, barLabelY); ctx.fillText(Math.round(barVal / 10000).toLocaleString() + '만', barEl.x, barLabelY);
                                    }
                                    if (lineEl && !lineMeta.hidden) {
                                        ctx.fillStyle = '#f39c12';
                                        ctx.textBaseline = lineVal >= 0 ? 'bottom' : 'top';
                                        ctx.strokeText(lineVal + '%', lineEl.x, lineLabelY); ctx.fillText(lineVal + '%', lineEl.x, lineLabelY);
                                    }
                                }
                            }
                        }],
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            layout: { padding: { top: 20, bottom: 0, left: 5, right: 5 } },
                            onClick: (e, activeEls) => {
                                if (activeEls.length > 0 && currentView !== 'combined') {
                                    const idx = activeEls[0].index; const rawData = safeFilteredHistory[idx]; if(!rawData || rawData.isCurrent) return;
                                    const ym = rawData.date.substring(0,7);
                                    document.getElementById('edit-modal-ym').value = ym;
                                    document.getElementById('edit-modal-title').innerText = `[ ${ym} ] 성과 데이터 수동 편집`;
                                    document.getElementById('edit-modal-principal').value = Math.round(rawData.principal);
                                    document.getElementById('edit-modal-eval').value = Math.round(rawData.evalValue);
                                    document.getElementById('edit-modal').style.display = 'flex';
                                }
                            },
                            plugins: { 
                                legend: { display: false }, datalabels: { display: false },
                                tooltip: {
                                    mode: 'index', intersect: false,
                                    callbacks: {
                                        title: (ctx) => ctx[0].label === '현재' ? '현재 실시간 상태' : '20' + ctx[0].label + ' 말 기준',
                                        beforeBody: (ctx) => {
                                            let r = safeFilteredHistory[ctx[0].dataIndex]; if(!r) return '';
                                            return ` 원금: ${Math.round(r.principal).toLocaleString()}원\n 평가: ${Math.round(r.evalValue).toLocaleString()}원\n`;
                                        },
                                        label: (ctx) => ctx.datasetIndex === 0 ? ` 수익금: ${ctx.raw > 0 ? '+' : ''}${Math.round(ctx.raw).toLocaleString()}원` : ` 수익률: ${ctx.raw > 0 ? '+' : ''}${ctx.raw}%`
                                    }
                                }
                            },
                            scales: { 
                                x: { ticks: { color: textColor, font:{size:10} }, grid: { display: false } }, 
                                y: { type: 'linear', display: true, position: 'left', ticks: { color: textColor, font:{size:10}, callback: (v) => Math.round((parseFloat(v)||0)/10000).toLocaleString() + '만' }, grid: { color: gridColor } },
                                y1: { type: 'linear', display: true, position: 'right', ticks: { color: textColor, font:{size:10}, callback: (v) => v + '%' }, grid: { drawOnChartArea: false } }
                            }
                        }
                    });
                }
            } catch(e) { console.error("Engine Error:", e); }
        }

        switchView(currentView);
    </script>
</body>
</html>
