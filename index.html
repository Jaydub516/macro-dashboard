<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매크로 & 자산 배분 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        /* 🌓 다크 모드 지원을 위한 CSS 변수 세팅 */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border-dash: #bdc3c7;
            --price-num: #2c3e50;
            --input-border: #dddddd;
        }
        .dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border-dash: #444444;
            --price-num: #ffffff;
            --input-border: #444444;
        }

        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; transition: background 0.3s, color 0.3s; }
        .dashboard-container { width: 100%; max-width: 1200px; }
        
        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .header-wrap h1 { margin: 0; font-size: 1.8rem; }
        
        /* 다크모드 토글 스위치 */
        .theme-toggle { background: var(--bg-card); border: 1px solid var(--text-sub); color: var(--text-main); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        
        /* 📊 고정 3열 4행 그리드 레이아웃 설정 */
        #cards-container { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 240px; gap: 20px; }

        /* 📱 반응형 레이아웃 디자인 (태블릿 & 모바일) */
        @media (max-width: 900px) { #cards-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            body { padding: 10px; } 
            .header-wrap { margin-bottom: 15px; }
            .header-wrap h1 { font-size: 1.3rem; } 
            #cards-container { grid-template-columns: 1fr; grid-auto-rows: 210px; gap: 12px; } 
            .card { padding: 12px; } 
            .asset-info h2 { font-size: 1rem; }
            .mdd-value { font-size: 1.1rem; } 
            .chart-container { min-height: 50px; margin: 5px 0; } 
            .add-form input, .add-form select { width: 90%; }
        }

        /* 공통 카드 스타일 */
        .card { 
            position: relative; background-color: var(--bg-card); border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; 
            justify-content: space-between; cursor: grab; transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
            box-sizing: border-box;
        }
        .card:active { cursor: grabbing; } 
        .card:hover.asset-card, .card:hover.countdown-card { transform: translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.1); }

        /* 우측 상단 삭제 버튼 */
        .delete-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.5rem; color: #bdc3c7; cursor: pointer; padding: 0; line-height: 1; z-index: 10; }
        .delete-btn:hover { color: #e74c3c; }

        .asset-info h2 { margin: 0; font-size: 1.05rem; color: var(--text-main); padding-right: 20px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .asset-info p { margin: 3px 0 0 0; color: var(--text-sub); font-size: 0.8rem; }
        
        /* 미니 차트 도화지 영역 */
        .chart-container { flex-grow: 1; position: relative; margin: 5px 0; min-height: 70px; }
        
        /* 하단 가격 및 알람 섹션 */
        .data-section { display: flex; justify-content: space-between; align-items: flex-end; }
        .mdd-wrapper { display: flex; flex-direction: column; }
        .price-info { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 2px; }
        .price-current { font-weight: bold; color: var(--price-num); }
        .price-high { color: #e74c3c; font-size: 0.75rem; margin-left: 3px; font-weight: bold; }
        
        .mdd-value { font-size: 1.25rem; font-weight: bold; }
        .status-badge { padding: 3px 9px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }
        
        /* 상태별 알람 색상 정의 */
        .status-normal { background-color: #e8f8f5; color: #1abc9c; }
        .status-warning { background-color: #fef9e7; color: #f39c12; }
        .status-danger { background-color: #fdedec; color: #e74c3c; }
        .status-loading { background-color: #f0f3f4; color: #7f8c8d; }

        /* ➕ 빈칸 및 종목 추가 폼 스타일 */
        .empty-card { border: 2px dashed var(--border-dash); background-color: transparent; box-shadow: none; cursor: default; display: flex; align-items: center; justify-content: center; }
        .empty-card:hover { transform: none; box-shadow: none; }
        
        .add-form { text-align: center; width: 100%; padding: 10px; box-sizing: border-box; }
        .add-form h3 { color: var(--text-sub); margin: 0 0 10px 0; font-size: 1rem; }
        .add-form select, .add-form input { width: 85%; padding: 8px; border: 1px solid var(--input-border); background: var(--bg-card); color: var(--text-main); border-radius: 6px; font-size: 0.9rem; margin-bottom: 8px; text-align: center; box-sizing: border-box; }
        .add-form input { text-transform: uppercase; }
        .add-form button { padding: 6px 20px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .add-form button:hover { background-color: #2980b9; }

        /* 🚨 카운트다운 타이머 디스플레이 */
        .timer-display { font-size: 1.4rem; font-weight: bold; color: #e74c3c; text-align: center; margin: 15px 0; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-wrap">
            <h1>📊 나의 매크로 모니터링 보드</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
        </div>
        <div id="cards-container"></div>
    </div>

    <script>
        // ★★★ 본인의 구글 웹 앱 URL로 반드시 교체해주세요! ★★★
        const MY_PROXY_URL = "https://script.google.com/macros/s/AKfycbzvORZeREAP6MKkYwLiqX10cApwleSCW96cezCTXAuDfAPD5zFz3O6THQ3izAUXNHxG/exec"; 
        
        const STORAGE_KEY = "myMacroMasterDashboard";

        // 초기 기본 자산 세팅 구성 (TGA 및 D-Day 포함)
        const DEFAULT_ASSETS = [
            { type: 'asset', ticker: 'MAGS', name: 'MAGS ETF (빅테크7)' },
            { type: 'asset', ticker: '^NDX', name: '나스닥 100 지수' },
            { type: 'asset', ticker: 'SGOV', name: '초단기채 (현금)' },
            { type: 'asset', ticker: '^TNX', name: '10년물 국채 금리' },
            { type: 'asset', ticker: '^VIX', name: 'VIX (공포 지수)' },
            { type: 'asset', ticker: 'KRW=X', name: '원/달러 환율' },
            { type: 'asset', ticker: 'FRED:WTREGEN', name: '미 재무부 TGA 잔고' },
            { type: 'countdown', ticker: 'ELECTION2026', name: '🚨 미국 국채 발행 집중기 리스크', targetDate: '2026-11-03' }
        ];

        let assets = localStorage.getItem(STORAGE_KEY) ? JSON.parse(localStorage.getItem(STORAGE_KEY)) : DEFAULT_ASSETS;
        let chartInstances = {};
        let timerIntervals = {};
        const MAX_CARDS = 12; // 3열 x 4행 고정

        function saveAssetsToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(assets)); }

        // 테마 초기화 및 설정 기억
        if(localStorage.getItem("theme") === "dark") { document.body.classList.add("dark-mode"); document.querySelector(".theme-toggle").innerText = "☀️ 라이트 모드"; }
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            document.querySelector(".theme-toggle").innerText = isDark ? "☀️ 라이트 모드" : "🌙 다크 모드";
        }

        async function renderDashboard() {
            const container = document.getElementById('cards-container');
            
            // 기존 상주 타이머들 초기화
            Object.values(timerIntervals).forEach(clearInterval);
            timerIntervals = {};
            container.innerHTML = ''; 

            for (let i = 0; i < MAX_CARDS; i++) {
                if (i < assets.length) {
                    let asset = assets[i];
                    const cardId = 'card-' + asset.ticker.replace(/[^a-zA-Z0-9]/g, ''); 
                    
                    if (asset.type === 'countdown') {
                        container.innerHTML += `
                            <div class="card countdown-card" id="${cardId}">
                                <button class="delete-btn" onclick="removeAsset('${asset.ticker}')" title="삭제">&times;</button>
                                <div class="asset-info">
                                    <h2>${asset.name}</h2>
                                    <p>타겟 기한: ${asset.targetDate}</p>
                                </div>
                                <div class="timer-display" id="timer-${cardId}">00일 00:00:00</div>
                                <div class="data-section" style="justify-content: center;">
                                    <div class="status-badge status-warning">⏳ 리스크 카운트다운</div>
                                </div>
                            </div>
                        `;
                        runCountdown(asset.targetDate, `timer-${cardId}`);
                    } else {
                        container.innerHTML += `
                            <div class="card asset-card" id="${cardId}" data-ticker="${asset.ticker}">
                                <button class="delete-btn" onclick="removeAsset('${asset.ticker}')" title="삭제">&times;</button>
                                <div class="asset-info">
                                    <h2><span id="name-${cardId}">${asset.name || '데이터 연동 중 🔍'}</span></h2>
                                    <p>${asset.ticker}</p>
                                </div>
                                <div class="chart-container"><canvas id="canvas-${cardId}"></canvas></div>
                                <div class="data-section">
                                    <div class="mdd-wrapper">
                                        <div class="price-info">
                                            현재: <span id="price-${cardId}" class="price-current">-</span>
                                            <span class="price-high">(🔴 <span id="high-${cardId}">-</span>)</span>
                                        </div>
                                        <div id="mdd-${cardId}" class="mdd-value">-</div>
                                    </div>
                                    <div id="status-${cardId}" class="status-badge status-loading">조회 중 ⏳</div>
                                </div>
                            </div>
                        `;
                        fetchData(asset, cardId);
                    }
                } 
                else if (i === assets.length) {
                    container.innerHTML += `
                        <div class="card empty-card non-draggable">
                            <div class="add-form">
                                <h3>➕ 새 모듈 정의</h3>
                                <select id="add-type" onchange="toggleFormFields()">
                                    <option value="asset">일반 해외 자산 ($ / pt / %)</option>
                                    <option value="fx-linked">원화 환산 실질 자산 (종목_KRW)</option>
                                    <option value="countdown">D-Day 일정 관리</option>
                                </select>
                                <input type="text" id="add-ticker" placeholder="티커 코드 입력">
                                <input type="text" id="add-extra" placeholder="종목 설명 또는 목표 날짜" style="display:none;">
                                <button onclick="gridAddModule()">추가하기</button>
                            </div>
                        </div>
                    `;
                    toggleFormFields();
                } 
                else {
                    container.innerHTML += `<div class="card empty-card non-draggable"></div>`;
                }
            }
            initDragAndDrop();
        }

        function toggleFormFields() {
            const type = document.getElementById('add-type').value;
            const tickerInput = document.getElementById('add-ticker');
            const extraInput = document.getElementById('add-extra');
            
            if (type === 'countdown') {
                tickerInput.placeholder = "식별 코드 (예: FOMC)";
                extraInput.placeholder = "날짜 (YYYY-MM-DD)";
                extraInput.style.display = "block";
            } else if (type === 'fx-linked') {
                tickerInput.placeholder = "미국 티커 입력 (자동 환산)";
                extraInput.style.display = "none";
            } else {
                tickerInput.placeholder = "티커 (예: TSLA, AAPL)";
                extraInput.style.display = "none";
            }
        }

        function runCountdown(targetStr, elementId) {
            function updateTimer() {
                const diff = new Date(targetStr) - new Date();
                const el = document.getElementById(elementId);
                if (!el) return;
                if (diff <= 0) {
                    el.innerText = "기한 만료 🚨";
                    return;
                }
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / (1000 * 60)) % 60);
                const secs = Math.floor((diff / 1000) % 60);
                el.innerText = `${days}일 ${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            }
            updateTimer();
            timerIntervals[elementId] = setInterval(updateTimer, 1000);
        }

        // 🛠️ 버그 수정 버전 드래그 앤 드롭 바인딩 함수
        function initDragAndDrop() {
            new Sortable(document.getElementById('cards-container'), {
                animation: 200, 
                delay: 150, 
                delayOnTouchOnly: true, 
                filter: '.non-draggable',
                preventOnFilter: false, // 💡 [필수 반영] 내부 인풋창 클릭/선택 차단 해제 옵션
                onEnd: function (evt) {
                    if (evt.oldIndex !== evt.newIndex && evt.newIndex < assets.length) {
                        const movedItem = assets.splice(evt.oldIndex, 1)[0];
                        assets.splice(evt.newIndex, 0, movedItem);
                        saveAssetsToStorage();
                    } else if (evt.newIndex >= assets.length) {
                        renderDashboard();
                    }
                }
            });
        }

        async function fetchData(asset, cardId) {
            try {
                if (MY_PROXY_URL === "YOUR_WEB_APP_URL") throw new Error("URL 미입력");
                const response = await fetch(`${MY_PROXY_URL}?ticker=${encodeURIComponent(asset.ticker)}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error);

                if (data.name && !asset.name) {
                    document.getElementById(`name-${cardId}`).innerText = data.name;
                    asset.name = data.name; saveAssetsToStorage();
                }
                updateCardUI(asset, cardId, data.price, data.high52);
                drawChart(cardId, data.chartLabels, data.chartData, document.getElementById(`status-${cardId}`).classList.contains("status-danger"));
            } catch (error) {
                document.getElementById(`status-${cardId}`).innerText = `❌ ${error.message}`;
                document.getElementById(`status-${cardId}`).className = "status-badge status-danger";
            }
        }

        function updateCardUI(asset, cardId, currentPrice, high52) {
            let mdd = (currentPrice / high52) - 1;
            let mddPercentage = (mdd * 100).toFixed(2) + "%";
            let statusMsg = ""; let statusClass = ""; let isDanger = false;
            let displayPrice, displayHigh;

            if (asset.ticker.indexOf('FRED:') === 0) {
                displayPrice = "$" + currentPrice.toFixed(1) + "B";
                displayHigh = "$" + high52.toFixed(1) + "B";
                mddPercentage = "유동성";
                if (currentPrice < 300) { statusMsg = "🚨 유동성 고갈"; statusClass = "status-danger"; isDanger = true; }
                else { statusMsg = "💵 재정고 모니터링"; statusClass = "status-normal"; }
            }
            else if (asset.ticker === 'KRW=X') {
                displayPrice = Math.round(currentPrice).toLocaleString('ko-KR') + "원";
                displayHigh = Math.round(high52).toLocaleString('ko-KR') + "원";
                mddPercentage = "환율"; statusMsg = "💵 외환 모니터링"; statusClass = "status-normal";
            } 
            else if (asset.ticker === '^TNX') {
                displayPrice = currentPrice.toFixed(2) + "%"; displayHigh = high52.toFixed(2) + "%";
                mddPercentage = "금리"; 
                if (currentPrice >= 5.0) { statusMsg = "🚨 금리 발작"; statusClass = "status-danger"; isDanger = true; }
                else if (currentPrice >= 4.5) { statusMsg = "⚠️ 금리 경고"; statusClass = "status-warning"; isDanger = true; }
                else { statusMsg = "✅ 안정"; statusClass = "status-normal"; }
            } 
            else if (asset.ticker === '^VIX') {
                displayPrice = currentPrice.toFixed(2) + "pt"; displayHigh = high52.toFixed(2) + "pt";
                mddPercentage = "공포지수"; 
                if (currentPrice >= 35) { statusMsg = "🚨 위험 청산"; statusClass = "status-danger"; isDanger = true; }
                else if (currentPrice >= 25) { statusMsg = "⚠️ 변동성 확대"; statusClass = "status-warning"; isDanger = true; }
                else { statusMsg = "✅ 안정"; statusClass = "status-normal"; }
            } 
            else {
                const isWon = asset.ticker.indexOf('_KRW') !== -1;
                displayPrice = isWon ? Math.round(currentPrice).toLocaleString('ko-KR') + "원" : "$" + currentPrice.toFixed(2);
                displayHigh = isWon ? Math.round(high52).toLocaleString('ko-KR') + "원" : "$" + high52.toFixed(2);
                
                if (mdd <= -0.30) { statusMsg = "🚨 3차 분할 매수"; statusClass = "status-danger"; isDanger = true; }
                else if (mdd <= -0.20) { statusMsg = "⚠️ 2차 분할 매수"; statusClass = "status-warning"; isDanger = true; }
                else if (mdd <= -0.15) { statusMsg = "🎯 1차 분할 매수"; statusClass = "status-warning"; }
                else { statusMsg = "☕ 관망"; statusClass = "status-normal"; }
            }

            document.getElementById(`price-${cardId}`).innerText = displayPrice;
            document.getElementById(`high-${cardId}`).innerText = displayHigh;
            document.getElementById(`mdd-${cardId}`).innerText = mddPercentage;
            
            const statusElement = document.getElementById(`status-${cardId}`);
            statusElement.innerText = statusMsg; statusElement.className = "status-badge " + statusClass;
            return isDanger;
        }

        function drawChart(cardId, labels, data, isDanger) {
            const canvasId = `canvas-${cardId}`;
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const lineColor = isDanger ? '#e74c3c' : '#3498db';
            const bgColor = isDanger ? 'rgba(231, 76, 60, 0.05)' : 'rgba(52, 152, 219, 0.05)';

            let maxVal = -Infinity; let maxIdx = -1;
            for (let i = 0; i < data.length; i++) { if (data[i] > maxVal) { maxVal = data[i]; maxIdx = i; } }

            let pointRadii = new Array(data.length).fill(0);
            let pointColors = new Array(data.length).fill('transparent');
            if (maxIdx !== -1) { pointRadii[maxIdx] = 4; pointColors[maxIdx] = '#e74c3c'; }

            if (chartInstances[cardId]) chartInstances[cardId].destroy();

            chartInstances[cardId] = new Chart(ctx, {
                type: 'line', data: { labels: labels, datasets: [{ data: data, borderColor: lineColor, backgroundColor: bgColor, borderWidth: 1.5, fill: true, pointRadius: pointRadii, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointHoverRadius: 6, tension: 0.08 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: true } },
                    scales: {
                        x: { display: true, ticks: { maxTicksLimit: 4, font: { size: 9 }, color: '#95a5a6' }, grid: { display: false } },
                        y: { display: false }
                    },
                    layout: { padding: { top: 5, bottom: 0 } }
                }
            });
        }

        function gridAddModule() {
            const type = document.getElementById('add-type').value;
            let ticker = document.getElementById('add-ticker').value.trim().toUpperCase();
            const extra = document.getElementById('add-extra').value.trim();
            
            if (!ticker) { alert("코드를 입력해 주세요."); return; }
            if (assets.length >= MAX_CARDS) { alert("공간이 부족합니다. (최대 12개 고정)"); return; }

            if (type === 'countdown') {
                if (!extra) { alert("목표 기한(YYYY-MM-DD)을 입력해 주세요."); return; }
                assets.push({ type: 'countdown', ticker: ticker, name: ticker, targetDate: extra });
            } else if (type === 'fx-linked') {
                ticker = ticker + "_KRW";
                if (assets.some(a => a.ticker === ticker)) { alert("이미 존재합니다."); return; }
                assets.push({ type: 'asset', ticker: ticker, name: "" });
            } else {
                if (assets.some(a => a.ticker === ticker)) { alert("이미 존재합니다."); return; }
                assets.push({ type: 'asset', ticker: ticker, name: "" });
            }

            saveAssetsToStorage();
            renderDashboard();
        }

        function removeAsset(ticker) {
            assets = assets.filter(asset => asset.ticker !== ticker);
            saveAssetsToStorage();
            renderDashboard();
        }

        renderDashboard();
    </script>
</body>
